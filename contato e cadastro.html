  <header>

      <img src="Biblioteca de Alexandria.png" alt="">

  <main>
    <div class="painel">

        <form>
          <div class="rotulo">Nome:</div>

        <div class="coluna-info">
          <img class="logo-info" src="Biblioteca de Alexandria.png" alt="">
          <div class="info-texto">
            (11) 98765-4321<br>
            contato@bibliotecaalexandria.com.br<br>

      </div>
